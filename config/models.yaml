# ============================================================================
# MODEL CONFIG
# Per-stage models with provider overrides and fallback chains. The default
# provider is Fireworks (api: below). Stages may name a provider from
# `providers:` (e.g. gemini for Gemma 4) and list fallbacks tried in order on
# any failure — a failing provider costs seconds, never the clip.
# ============================================================================

api:
  base_url: https://api.fireworks.ai/inference/v1
  audio_base_url: https://api.fireworks.ai/inference/v1
  timeout_s: 25           # per request; the track rule is <30s/request
  max_retries: 2          # tenacity, backoff clamped to 1-5s

# Gemma 4 lives on the Gemini API's OpenAI-compatible endpoint (free tier) and
# OpenRouter (fallback tier). Keys are baked at build time via build-args; when
# a key is absent the provider is skipped and the chain falls through to
# Fireworks, so the pipeline never depends on Gemma being reachable.
providers:
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key_env: GEMINI_API_KEY
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

# --- STAGE A: Understanding (vision) -----------------------------------------
# Neutral ground-truth fact sheet from frames + transcript. Accuracy engine.
# Gemma 4 26B A4B is natively a video-understanding model, so 12 sampled frames
# is its home turf, not a shoehorn.
understand:
  model: gemma-4-26b-a4b-it
  provider: gemini
  timeout_s: 30
  fallbacks:
    - { model: "google/gemma-4-26b-a4b-it", provider: openrouter }
    - { model: "accounts/fireworks/models/kimi-k2p6", provider: "" }
  supports_vision: true
  max_images: 12          # even sampling across the clip; scene detect is off
  image_max_edge: 768
  image_format: jpeg
  image_quality: 85       # keep text/signage legible; a real accuracy edge
  temperature: 0.2
  max_tokens: 900
  extra_body:
    reasoning_effort: "none"

# --- STAGE 3: Comedy-material extraction (text) ------------------------------
# Reuses the style model (and its provider routes), i.e. Gemma 4 31B.
comedy:
  enabled: true
  model: ""               # empty => the style model + its fallback chain
  temperature: 0.7

# --- STAGE B: Style rendering (text) -----------------------------------------
style:
  model: gemma-4-31b-it
  provider: gemini
  timeout_s: 15
  fallbacks:
    - { model: "google/gemma-4-31b-it", provider: openrouter }
    - { model: "accounts/fireworks/models/kimi-k2p6", provider: "" }
  supports_vision: false
  temperature: 0.85
  max_tokens: 900
  n_candidates: 3
  temperature_formal: 0.3
  temperature_humor: 0.9
  extra_body:
    reasoning_effort: "none"

# --- JUDGE: candidate selection ------------------------------------------------
# Stays on Fireworks glm-5p2: a different model family referees Gemma's captions
# blind (stronger prize story than Gemma judging itself), and it keeps a warm
# Fireworks path alive as the last-resort fallback for every stage.
judge:
  enabled: true           # best-of-N selection; critique.enabled only gates regen
  model: accounts/fireworks/models/glm-5p2
  timeout_s: 15
  supports_vision: false
  temperature: 0.0
  max_tokens: 500
  extra_body:
    reasoning_effort: "none"

# --- ASR: audio transcription ------------------------------------------------
asr:
  backend: local          # local | fireworks | none
  model: whisper-v3       # only used if backend=fireworks
  # base is the latency sweet spot: ASR is a garnish on the fact sheet, not the
  # dish, and the rival scored 0.83+ with no audio at all.
  local_model_size: base

# --- Self-critique regeneration loop ------------------------------------------
critique:
  enabled: true
  min_score: 5.0          # the judge prompt demands stinginess; 6-8 is a GOOD score
  max_retries: 1
