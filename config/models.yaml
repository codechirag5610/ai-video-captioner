# ============================================================================
# MODEL-AGNOSTIC CONFIG
# Launch day: the hackathon reveals the available Fireworks models. Edit ONLY
# this file to swap them in. No code changes required.
#
# Fireworks model ids look like: accounts/fireworks/models/<name>
# List available models: https://app.fireworks.ai/models  (or the API)
# ============================================================================

api:
  base_url: https://api.fireworks.ai/inference/v1
  # Audio endpoint. Fireworks serves whisper at the same base in most regions.
  audio_base_url: https://api.fireworks.ai/inference/v1
  timeout_s: 120
  max_retries: 5          # tenacity handles backoff on 429/5xx

# --- STAGE A: Understanding (vision) -----------------------------------------
# Extracts neutral ground-truth facts from frames + transcript. Accuracy engine.
# Prefer a multimodal model. If a Gemma-3 vision model is offered, use it here
# to strengthen the "Best Use of Gemma" prize story.
understand:
  model: accounts/fireworks/models/kimi-k2p6   # only vision-capable model on this account
  supports_vision: true
  max_images: 10          # frames per request; sampler caps to this
  image_max_edge: 768     # px; resize longest edge to save tokens
  image_format: jpeg
  image_quality: 85
  temperature: 0.2        # low = factual
  max_tokens: 2000        # fact sheet JSON; reasoning disabled below
  extra_body:
    reasoning_effort: "none"   # kimi is a reasoning model; CoT otherwise eats the budget & truncates JSON

# --- STAGE 3: Comedy-material extraction (text) ------------------------------
# Cheap LLM pass over the fact sheet: lists the inherently absurd/ironic elements
# and their tech-angle, so humor styles aim at grounded, pre-validated material
# instead of free-associating (which is where hallucination creeps in).
# Reuses the style model unless `model` is set. Skipped for the formal style.
comedy:
  enabled: true
  model: ""               # empty => use the style model below
  temperature: 0.7

# --- STAGE B: Style rendering (text) -----------------------------------------
# Turns the ground-truth into 4 styled captions via best-of-N + judge selection.
# Tone engine. Set model to a Gemma text model to maximize Gemma-prize
# eligibility, e.g. accounts/fireworks/models/gemma-3-27b-it
style:
  model: accounts/fireworks/models/kimi-k2p6   # reliable JSON output for candidate parsing
  supports_vision: false
  temperature: 0.85       # fallback temp if the per-style temps below are unused
  max_tokens: 900         # N short candidates as JSON; reasoning disabled below
  n_candidates: 3         # best-of-N: candidates generated per style
  temperature_formal: 0.3 # formal wants precision, low variance
  temperature_humor: 0.9  # humor/sarcasm want variance -> better jokes
  extra_body:
    reasoning_effort: "none"

# --- JUDGE: local eval (should differ from generator to avoid self-bias) -----
judge:
  model: accounts/fireworks/models/glm-5p2   # different family from style (avoids self-bias)
  supports_vision: false
  temperature: 0.0
  max_tokens: 1500        # per-candidate scores JSON; reasoning disabled below
  extra_body:
    reasoning_effort: "none"

# --- ASR: audio transcription ------------------------------------------------
asr:
  backend: none           # fireworks | local | none  (Whisper not provisioned on this account -> 403)
  model: whisper-v3       # fireworks audio model id (unused while backend=none)
  # local backend uses faster-whisper; set size below if backend=local
  local_model_size: base

# --- Self-critique regeneration loop (optional, costs credits) ---------------
critique:
  enabled: true
  min_score: 7.0          # regenerate a style if judged accuracy or tone < this
  max_retries: 1          # extra regen attempts per style
